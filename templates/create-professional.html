{% extends "base.html" %}
{% block title %}Register as Professional — NutriTrack{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card auth-card--wide">
        <div class="auth-brand">
            <h1>Nutri<span>Track</span></h1>
            <p>Register as a health professional</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full name</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Dr. Sarah Jones"
                        autocomplete="name"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="dr_sarah"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="sarah@clinic.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="specialisation">Specialisation(s)</label>
                <input
                    type="text"
                    id="specialisation"
                    name="specialisation"
                    placeholder="Weight loss, diabetes, sports nutrition"
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea
                    id="bio"
                    name="bio"
                    rows="3"
                    placeholder="Tell subscribers about your background and approach..."
                ></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Min. 6 characters"
                        autocomplete="new-password"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Repeat password"
                        autocomplete="new-password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        </div>
    </div>
</div>

{% endblock %}
