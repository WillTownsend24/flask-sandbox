{% extends "base.html" %}
{% block title %}Update Health Stats — NutriTrack{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title">Update Health Stats</h1>
</div>

<div class="card card--narrow">
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="weight_kg">Weight (kg)</label>
            <input type="number" id="weight_kg" name="weight_kg" step="0.1" min="20" max="300"
                   value="{{ user.weight_kg or '' }}" placeholder="e.g. 72.5">
        </div>
        <div class="form-group">
            <label for="height_cm">Height (cm)</label>
            <input type="number" id="height_cm" name="height_cm" step="0.1" min="100" max="250"
                   value="{{ user.height_cm or '' }}" placeholder="e.g. 175">
        </div>
        <div class="form-group">
            <label for="blood_pressure">Blood Pressure (e.g. 120/80)</label>
            <input type="text" id="blood_pressure" name="blood_pressure"
                   value="{{ user.blood_pressure or '' }}" placeholder="120/80"
                   pattern="\d{2,3}\/\d{2,3}">
        </div>
        <div class="form-row">
            <button type="submit" class="btn btn-primary">Save Stats</button>
            <a href="{{ url_for('subscriber_home') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
