{% extends "base.html" %}
{% block title %}Create Account — NutriTrack{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <h1>Nutri<span>Track</span></h1>
            <p>Create a client account</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username_client"
                    placeholder="Username"
                    autocomplete="username"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password_client"
                    placeholder="Password"
                    autocomplete="new-password"
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
            <p>Are you a professional? <a href="{{ url_for('create_professional') }}">Register here</a></p>
        </div>
    </div>
</div>

{% endblock %}
