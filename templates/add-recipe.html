{% extends "base.html" %}
{% block title %}Add Recipe | NutriTrack{% endblock %}

{% block content %}

<div class="page-header">
    <div class="header-copy">
        <h1 class="page-title">Add Recipe</h1>
        <p class="page-subtitle">
            Post your recipe for other users to try.
        </p>
    </div>
</div>

<div class="card recipe-card">
    <form id="recipeForm" method="POST">

        <div class="form-group">
            <label for="title">Recipe name *</label>

            <input
                id="title"
                type="text"
                name="title"
                maxlength="120"
                placeholder="Chicken pasta bake"
                autocomplete="off"
                required
            >
        </div>

        <div class="form-group">
            <label for="description">Description</label>

            <input type="text"
                   name="description"
                   id="description"
                   placeholder="Quick dinner recipe...">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="prep_time_mins">Prep time</label>

                <input
                    name="prep_time_mins"
                    id="prep_time_mins"
                    type="number"
                    min="0"
                    inputmode="numeric"
                    placeholder="10"
                >
            </div>

            <div class="form-group">
                <label for="cook_time_mins">Cook time</label>

                <input
                    type="number"
                    name="cook_time_mins"
                    id="cook_time_mins"
                    min="0"
                    placeholder="25"
                    inputmode="numeric"
                >
            </div>

            <div class="form-group">
                <label for="servings">Servings</label>

                <input
                    id="servings"
                    name="servings"
                    type="number"
                    value="2"
                    min="1"
                    inputmode="numeric"
                >
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="cost_estimate">Estimated cost</label>

                <input
                    type="text"
                    placeholder="£5"
                    id="cost_estimate"
                    name="cost_estimate"
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label for="calories_per_serving">Calories</label>

                <input
                    type="number"
                    id="calories_per_serving"
                    name="calories_per_serving"
                    placeholder="450"
                    inputmode="numeric"
                >
            </div>

        </div>

        <div class="form-group">
            <label for="tags">Tags</label>

            <input
                type="text"
                id="tags"
                name="tags"
                placeholder="healthy, vegan, cheap"
                autocomplete="off"
            >
        </div>

        <div class="form-group">
            <label>Ingredients *</label>

            <div id="ingredients">

                <div class="ingredient-item">

                    <input
                        type="text"
                        name="ingredient_name[]"
                        placeholder="Ingredient"
                        required
                    >

                    <input type="text"
                           name="ingredient_amount[]"
                           placeholder="Amount">

                    <button type="button"
                            class="remove-btn"
                            onclick="removeIngredient(this)">
                        Remove
                    </button>

                </div>

            </div>

            <button type="button" class="btn btn-outline btn-sm" id="addIngredientBtn">
                Add another ingredient
            </button>

        </div>

        <div class="form-group">
            <label for="instructions">Instructions *</label>

            <textarea
                name="instructions"
                id="instructions"
                rows="8"
                required
                placeholder="1. Add oil to pan&#10;2. Cook onions for 5 minutes&#10;3. ..."
            ></textarea>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">
                Save Recipe
            </button>

            <a class="btn btn-outline" href="{{ url_for('recipes') }}">
                Back
            </a>
        </div>

    </form>
</div>

{% endblock %}

{% block scripts %}

<script>

const ingredientContainer = document.getElementById('ingredients');
const addIngredientBtn = document.getElementById('addIngredientBtn');

addIngredientBtn.addEventListener('click', () => {

    const item = document.createElement('div');
    item.className = 'ingredient-item';

    item.innerHTML = `
        <input type="text"
               name="ingredient_name[]"
               placeholder="Ingredient">

        <input
            type="text"
            name="ingredient_amount[]"
            placeholder="Amount"
        >

        <button
            class="remove-btn"
            type="button"
            onclick="removeIngredient(this)">
            Remove
        </button>
    `;

    ingredientContainer.appendChild(item);

});

function removeIngredient(button) {

    const ingredientItems = ingredientContainer.querySelectorAll('.ingredient-item');

    if (ingredientItems.length <= 1) return;

    const parent = button.closest('.ingredient-item');

    if (parent) {
        parent.remove();
    }
}

</script>

{% endblock %}
