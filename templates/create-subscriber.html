{% extends "base.html" %}
{% block title %}Create Account — NutriTrack{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card auth-card--wide">
        <div class="auth-brand">
            <h1>Nutri<span>Track</span></h1>
            <p>Create your account</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full name</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Jane Smith"
                        autocomplete="name"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="janesmith"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@email.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Min. 6 characters"
                        autocomplete="new-password"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Repeat password"
                        autocomplete="new-password"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="goal">Goal</label>
                <select id="goal" name="goal">
                    <option value="maintain">Maintain weight</option>
                    <option value="lose_weight">Lose weight</option>
                    <option value="gain_weight">Gain weight / build muscle</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Create account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
            <p>Are you a health professional? <a href="{{ url_for('create_professional') }}">Register here</a></p>
        </div>
    </div>
</div>

{% endblock %}
